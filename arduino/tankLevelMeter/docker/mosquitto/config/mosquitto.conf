# =====================================================================
#  Mosquitto MQTT broker – konfigurace pro Home Assistant (HA Container).
#  Broker běží jako samostatný Docker kontejner vedle Home Assistantu.
# =====================================================================

# MQTT na standardním portu (nešifrované – pro lokální síť OK).
listener 1883

# Mosquitto 2.x ve výchozím stavu odmítá anonymní přístup.
# Vyžadujeme přihlášení jménem/heslem ze souboru passwd (viz README).
allow_anonymous false
password_file /mosquitto/config/passwd

# Aby retained zprávy (HA discovery) přežily restart brokeru.
persistence true
persistence_location /mosquitto/data/

# Log do stdout -> uvidíš ho v `docker logs mosquitto`.
log_dest stdout
