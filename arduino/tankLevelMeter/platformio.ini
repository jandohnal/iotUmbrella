; PlatformIO Project Configuration File
;
; Jeden projekt, dvě zařízení = dvě prostředí (environments).
;   sender   = Arduino Pro Mini 3.3V/8 MHz -> senzor + nRF24, vysílá data, nízká spotřeba
;   receiver = ESP32                       -> nRF24 + displej, výpočet a zobrazení
;
; Sdílený kontrakt rádiové zprávy je v lib/TankProtocol/ a linkuje se do obou.
;
; Build / upload:
;   pio run -e sender   -t upload
;   pio run -e receiver -t upload

[platformio]
default_envs = sender, receiver

; ---------- Arduino Pro Mini 3.3V/8 MHz: vysílač ----------
; Programuje se přes USB-TTL převodník s čipem CH9102.
; Zapojení: 3V3->VCC, GND->GND, TXD->RXI, RXD->TXO, DTR->DTR (auto-reset).
; POZOR: převodník musí být přepnutý na 3.3V kvůli logickým úrovním i napájení.
[env:sender]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino
monitor_speed = 115200
; Pevný port převodníku CH9102 – zabrání výběru špatného sériového portu na Macu.
monitor_port = /dev/cu.usbserial-58AA0549471
upload_port = /dev/cu.usbserial-58AA0549471
; Bootloader Pro Mini 3.3V běží na 57600 Bd.
upload_speed = 57600
build_src_filter = +<sender/>
lib_deps =
    teckel12/NewPing@^1.9.7
    nrf24/RF24@^1.4.8
    rocketscream/Low-Power@^1.81
    sensirion/Sensirion I2C SHT4x@^1.1.0

; ---------- ESP32: přijímač ----------
[env:receiver]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Pevný port desky (CP2102) – na Macu je připojeno víc sériových portů,
; tohle zabrání tomu, aby si monitor/upload vybral špatný (Bluetooth apod.).
monitor_port = /dev/cu.usbserial-0001
upload_port = /dev/cu.usbserial-0001
build_src_filter = +<receiver/>
; MQTT_MAX_PACKET_SIZE – HA discovery zprávy jsou delší než výchozích 256 B.
build_flags =
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    nrf24/RF24@^1.4.8
    olikraus/U8g2@^2.35.30
    knolleary/PubSubClient@^2.8
