; PlatformIO Project Configuration File
;
; Jeden projekt, dvě zařízení = dvě prostředí (environments).
;   sender   = Arduino Nano  -> senzor + nRF24, vysílá data, nízká spotřeba
;   receiver = ESP32         -> nRF24 + displej, výpočet a zobrazení
;
; Sdílený kontrakt rádiové zprávy je v lib/TankProtocol/ a linkuje se do obou.
;
; Build / upload:
;   pio run -e sender   -t upload
;   pio run -e receiver -t upload

[platformio]
default_envs = sender, receiver

; ---------- Arduino Nano: vysílač ----------
[env:sender]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
build_src_filter = +<sender/>
lib_deps =
    teckel12/NewPing@^1.9.7
    nrf24/RF24@^1.4.8
    rocketscream/Low-Power@^1.81

; ---------- ESP32: přijímač ----------
[env:receiver]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<receiver/>
lib_deps =
    nrf24/RF24@^1.4.8
    olikraus/U8g2@^2.35.30
