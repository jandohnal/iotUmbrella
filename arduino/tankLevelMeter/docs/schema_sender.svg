<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 620" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .title  { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .sub    { font-size: 13px; fill: #555; }
    .board  { fill: #1d3557; stroke: #0d1b2a; stroke-width: 2; }
    .boardlabel { fill: #fff; font-size: 16px; font-weight: 700; }
    .comp   { fill: #2a9d8f; stroke: #1e7268; stroke-width: 2; }
    .comp2  { fill: #e76f51; stroke: #b8442b; stroke-width: 2; }
    .comp3  { fill: #6a4c93; stroke: #4a3568; stroke-width: 2; }
    .complabel { fill: #fff; font-size: 14px; font-weight: 700; }
    .pin    { font-size: 12px; fill: #1a1a2e; }
    .pinw   { font-size: 12px; fill: #fff; }
    .note   { font-size: 11px; fill: #9b2226; }
    .w5     { stroke: #e63946; stroke-width: 2.5; fill: none; }  /* RAW (baterie) */
    .w3     { stroke: #f4a261; stroke-width: 2.5; fill: none; }  /* 3.3V */
    .wg     { stroke: #495057; stroke-width: 2.5; fill: none; }  /* GND */
    .wd     { stroke: #457b9d; stroke-width: 2.5; fill: none; }  /* data */
    .leglbl { font-size: 12px; fill: #333; }
  </style>

  <text x="20" y="34" class="title">Vysílač – Arduino Pro Mini 3.3V</text>
  <text x="20" y="54" class="sub">RCWL-1655 (ultrazvuk) + SHT40 (teplota/vlhkost, I²C) + nRF24L01 (rádio) · HW SPI</text>

  <!-- Arduino Pro Mini board -->
  <rect x="300" y="150" width="170" height="330" rx="8" class="board"/>
  <text x="385" y="306" class="boardlabel" text-anchor="middle">Arduino</text>
  <text x="385" y="326" class="boardlabel" text-anchor="middle">Pro Mini</text>
  <text x="385" y="346" class="boardlabel" text-anchor="middle" font-size="13">3.3V / 8 MHz</text>

  <!-- Pro Mini pin stubs (right side -> nRF24) -->
  <text x="462" y="184" class="pinw" text-anchor="end">D13</text>
  <text x="462" y="212" class="pinw" text-anchor="end">D12</text>
  <text x="462" y="240" class="pinw" text-anchor="end">D11</text>
  <text x="462" y="268" class="pinw" text-anchor="end">D8</text>
  <text x="462" y="296" class="pinw" text-anchor="end">D7</text>
  <text x="462" y="324" class="pinw" text-anchor="end">VCC</text>
  <text x="462" y="459" class="pinw" text-anchor="end">GND</text>

  <!-- Pro Mini pin stubs (left side -> ultrazvuk + SHT40) -->
  <text x="308" y="189" class="pinw" text-anchor="start">RAW</text>
  <text x="308" y="219" class="pinw" text-anchor="start">D9</text>
  <text x="308" y="249" class="pinw" text-anchor="start">D4</text>
  <text x="308" y="359" class="pinw" text-anchor="start">A4</text>
  <text x="308" y="384" class="pinw" text-anchor="start">A5</text>
  <text x="308" y="414" class="pinw" text-anchor="start">VCC</text>
  <text x="308" y="459" class="pinw" text-anchor="start">GND</text>

  <!-- RCWL-1655 ultrazvuk -->
  <rect x="40" y="150" width="150" height="120" rx="8" class="comp2"/>
  <text x="115" y="176" class="pinw" text-anchor="middle" font-weight="700" font-size="14">RCWL-1655</text>
  <text x="115" y="192" class="pinw" text-anchor="middle" font-size="11">/ AJ-SR04M</text>
  <text x="50" y="216" class="pinw">VCC</text>
  <text x="50" y="236" class="pinw">TRIG</text>
  <text x="50" y="256" class="pinw">ECHO</text>
  <text x="150" y="216" class="pinw" text-anchor="end">GND</text>

  <!-- SHT40 teplota/vlhkost -->
  <rect x="40" y="330" width="150" height="120" rx="8" class="comp3"/>
  <text x="115" y="358" class="complabel" text-anchor="middle">SHT40</text>
  <text x="115" y="374" class="pinw" text-anchor="middle" font-size="11">I²C · adr. 0x44</text>
  <text x="50" y="400" class="pinw">VCC</text>
  <text x="50" y="420" class="pinw">SDA</text>
  <text x="50" y="440" class="pinw">SCL</text>
  <text x="150" y="400" class="pinw" text-anchor="end">GND</text>

  <!-- Wires: RCWL-1655 to Pro Mini -->
  <path class="w5"  d="M190 211 H 255 V 184 H 300"/>   <!-- VCC -> RAW (baterie) -->
  <path class="wd"  d="M190 231 H 245 V 219 H 300"/>   <!-- TRIG -> D9 -->
  <path class="wd"  d="M190 251 H 300"/>               <!-- ECHO -> D4 -->
  <path class="wg"  d="M150 211 H 130 V 290 H 270 V 454 H 300"/>  <!-- GND -->

  <!-- Wires: Pro Mini to SHT40 -->
  <path class="wd"  d="M300 354 H 240 V 415 H 190"/>   <!-- A4 -> SDA -->
  <path class="wd"  d="M300 379 H 230 V 435 H 190"/>   <!-- A5 -> SCL -->
  <path class="w3"  d="M300 409 H 250 V 395 H 190"/>   <!-- VCC 3.3V -->
  <path class="wg"  d="M300 454 H 215 V 395 H 190"/>   <!-- GND -->

  <!-- Wires: Pro Mini to nRF24 (každý spoj má vlastní svislou dráhu = čitelné) -->
  <path class="wd"  d="M470 180 H 486 V 269 H 598"/>   <!-- D13-SCK -->
  <path class="wd"  d="M470 208 H 500 V 315 H 598"/>   <!-- D12-MISO -->
  <path class="wd"  d="M470 236 H 514 V 292 H 598"/>   <!-- D11-MOSI -->
  <path class="wd"  d="M470 264 H 528 V 246 H 598"/>   <!-- D8-CSN -->
  <path class="wd"  d="M470 292 H 542 V 223 H 598"/>   <!-- D7-CE -->
  <path class="w3"  d="M470 320 H 556 V 200 H 598"/>   <!-- VCC 3.3V -->
  <path class="wg"  d="M470 455 H 570 V 345 H 598"/>   <!-- GND -->

  <!-- nRF24L01 -->
  <rect x="600" y="150" width="180" height="220" rx="8" class="comp"/>
  <text x="690" y="178" class="complabel" text-anchor="middle">nRF24L01</text>
  <text x="612" y="205" class="pinw">VCC 3.3V</text>
  <text x="612" y="228" class="pinw">CE</text>
  <text x="612" y="251" class="pinw">CSN</text>
  <text x="612" y="274" class="pinw">SCK</text>
  <text x="612" y="297" class="pinw">MOSI</text>
  <text x="612" y="320" class="pinw">MISO</text>
  <text x="612" y="350" class="pinw">GND  (IRQ nezapojeno)</text>

  <text x="20" y="500" class="note">⚠ ECHO musí být na D4 (ne D10 = SPI SS, jinak rawUs = 0).</text>
  <text x="20" y="518" class="note">⚡ RCWL-1655 napájen z RAW (baterie 18650, 3–5,5 V tolerantní).</text>
  <text x="20" y="536" class="note">⚡ Slabý onboard regulátor → 3,3 V rail z externího LDO (HT7333) na VCC.</text>
  <text x="20" y="554" class="note">💡 SHT40 na I²C (A4=SDA, A5=SCL), napájení 3,3 V – max 3,6 V! · 💡 ≥47 µF u nRF24.</text>

  <!-- legend -->
  <line x1="430" y1="586" x2="460" y2="586" class="w5"/>  <text x="466" y="590" class="leglbl">RAW</text>
  <line x1="500" y1="586" x2="530" y2="586" class="w3"/>  <text x="536" y="590" class="leglbl">3.3V</text>
  <line x1="580" y1="586" x2="610" y2="586" class="wd"/>  <text x="616" y="590" class="leglbl">data</text>
  <line x1="660" y1="586" x2="690" y2="586" class="wg"/>  <text x="696" y="590" class="leglbl">GND</text>
</svg>
